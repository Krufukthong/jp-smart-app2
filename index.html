<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP-Smart App</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans Thai', sans-serif;
    }

    .menu-card {
      position: relative;
      overflow: hidden;
      transform: translateY(0) scale(1);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease, background .22s ease;
    }

    .menu-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(20,184,166,.10) 45%, rgba(34,211,238,.18) 55%, transparent 100%);
      transform: translateX(-120%);
      transition: transform .55s ease;
      pointer-events: none;
    }

    .menu-card:hover {
      transform: translateY(-5px) scale(1.015);
      box-shadow: 0 18px 35px rgba(13, 148, 136, .22);
      border-color: rgba(13,148,136,.45);
      background: linear-gradient(135deg, #ffffff, #f0fdfa);
    }

    .menu-card:hover::before {
      transform: translateX(120%);
    }

    .menu-card:active {
      transform: translateY(3px) scale(.985);
      box-shadow: inset 0 5px 12px rgba(15, 118, 110, .18), 0 8px 18px rgba(15, 118, 110, .14);
    }

    .menu-icon {
      transition: transform .22s ease, background .22s ease;
    }

    .menu-card:hover .menu-icon {
      transform: rotate(-6deg) scale(1.08);
      background: #ccfbf1;
    }

    .menu-arrow {
      transition: transform .22s ease;
    }

    .menu-card:hover .menu-arrow {
      transform: translateX(5px);
    }

    .jp-title {
      letter-spacing: -.03em;
      text-shadow: 0 3px 10px rgba(0,0,0,.18);
    }
  </style>
</head>
